name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (arm64)
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS (x86_64)
            os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ''
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Export Apple signing env (if secrets present)
        if: matrix.platform.os == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Apple cert found; exporting signing env for tauri-action."
            {
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_CERTIFICATE<<__CCSETTINGS_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__CCSETTINGS_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No Apple cert secret; macOS build will ship unsigned."
          fi

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ccsettings ${{ github.ref_name }}'
          releaseBody: |
            See the CHANGELOG for details.

            macOS downloads are unsigned until the Apple signing secrets
            are configured; Gatekeeper will warn — right-click the .app
            and pick "Open" the first time.
            Windows downloads are unsigned; SmartScreen will warn on
            first launch — click "More info" then "Run anyway".
            Linux: AppImage is portable; .deb installs system-wide.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.platform.args }}

  publish-manifest:
    name: publish latest.json
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Assemble and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob  # make *.sig expand to empty when there are no matches
          mkdir -p /tmp/sigs
          cd /tmp/sigs

          # Download every .sig asset from the draft release. Using --pattern
          # with a glob keeps this robust against tauri-action naming changes.
          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.sig' \
            --dir /tmp/sigs

          ls -la

          # Up-front sanity: if no .sig files downloaded, diagnose clearly
          # rather than letting the loop iterate on the literal "*.sig".
          sig_files=(*.sig)
          if [ ${#sig_files[@]} -eq 0 ]; then
            echo "::error::no .sig files found on the draft release — tauri-action likely ran without TAURI_SIGNING_PRIVATE_KEY set"
            exit 1
          fi

          # Classify each .sig by substring and remember its bundle URL.
          # tauri-action v0 names them like:
          #   ccsettings_${V}_aarch64.app.tar.gz.sig
          #   ccsettings_${V}_x64.app.tar.gz.sig
          #   ccsettings_${V}_amd64.AppImage.tar.gz.sig
          #   ccsettings_${V}_x64-setup.nsis.zip.sig
          VERSION="${TAG#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          declare -A SIG
          declare -A URL
          for f in "${sig_files[@]}"; do
            bundle="${f%.sig}"
            content=$(cat "$f")
            case "$bundle" in
              *aarch64.app.tar.gz)
                SIG[darwin-aarch64]="$content"
                URL[darwin-aarch64]="${BASE}/${bundle}"
                ;;
              *x64.app.tar.gz)
                SIG[darwin-x86_64]="$content"
                URL[darwin-x86_64]="${BASE}/${bundle}"
                ;;
              *.AppImage.tar.gz)
                SIG[linux-x86_64]="$content"
                URL[linux-x86_64]="${BASE}/${bundle}"
                ;;
              *nsis.zip)
                SIG[windows-x86_64]="$content"
                URL[windows-x86_64]="${BASE}/${bundle}"
                ;;
              *)
                echo "::warning::unrecognized signed bundle: $bundle"
                ;;
            esac
          done

          # Fail loudly if any platform is missing its signature — we don't
          # want to publish a manifest that silently omits a platform.
          for plat in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            if [ -z "${SIG[$plat]:-}" ]; then
              echo "::error::missing signed bundle for $plat"
              exit 1
            fi
          done

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build latest.json with jq so the raw multi-line minisign .sig
          # contents get properly JSON-escaped (newlines → \n). Tauri's
          # updater expects the signature field to be the full, unmodified
          # .sig content — not a base64 re-encoding of it — so we only
          # rely on jq for string escaping.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the CHANGELOG for details." \
            --arg pub_date "$PUB_DATE" \
            --arg sig_darwin_arm64 "${SIG[darwin-aarch64]}" \
            --arg url_darwin_arm64 "${URL[darwin-aarch64]}" \
            --arg sig_darwin_x86_64 "${SIG[darwin-x86_64]}" \
            --arg url_darwin_x86_64 "${URL[darwin-x86_64]}" \
            --arg sig_linux_x86_64 "${SIG[linux-x86_64]}" \
            --arg url_linux_x86_64 "${URL[linux-x86_64]}" \
            --arg sig_windows_x86_64 "${SIG[windows-x86_64]}" \
            --arg url_windows_x86_64 "${URL[windows-x86_64]}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig_darwin_arm64, url: $url_darwin_arm64 },
                "darwin-x86_64":  { signature: $sig_darwin_x86_64, url: $url_darwin_x86_64 },
                "linux-x86_64":   { signature: $sig_linux_x86_64, url: $url_linux_x86_64 },
                "windows-x86_64": { signature: $sig_windows_x86_64, url: $url_windows_x86_64 }
              }
            }' > /tmp/latest.json

          python3 -m json.tool /tmp/latest.json > /dev/null

          gh release upload "$TAG" /tmp/latest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
